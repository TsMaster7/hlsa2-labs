name: hlsa2-lab-2-3

services:

  postgres:
    image: postgres:16-alpine
    container_name: hlsa2-postgres
    environment:
      POSTGRES_USER: sut
      POSTGRES_PASSWORD: sut
      POSTGRES_DB: sut
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - log_min_duration_statement=200
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    # Intentionally NOT exposed on the host. Students often have a
    # local Postgres on 5432 and the SUT reaches this one via the
    # internal docker network anyway. To inspect manually, exec into
    # the container: docker compose exec postgres psql -U sut sut
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sut", "-d", "sut"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [labnet]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: hlsa2-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://sut:sut@postgres:5432/sut?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    networks: [labnet]

  # node-exporter's classic /host/proc + /host/sys + rslave-rootfs mount
  # does not work on Docker Desktop for macOS (no rslave support on the
  # virtualised root). For the lab's purposes - host CPU, network, and
  # TCP-state metrics - the in-container view is adequate; on Linux,
  # collectors that scrape /proc and /sys see the host's namespaces
  # by default when --pid=host. On Docker Desktop you get the VM's
  # namespaces, which is still a valid signal for the soak test.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: hlsa2-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.netstat
      - --collector.tcpstat
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    networks: [labnet]

  downstream:
    build:
      context: .
      dockerfile: downstream/Dockerfile
    image: hlsa2-lab-2-3/downstream:dev
    container_name: hlsa2-downstream
    environment:
      LATENCY_MS: "30"
      LATENCY_JITTER_MS: "5"
      STALL_EVERY_N: "0"
      STALL_DURATION_MS: "8000"
    ports:
      - "${LAB_DOWNSTREAM_PORT:-8081}:8081"
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:8081/healthz
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [labnet]

  sut:
    build:
      context: .
      dockerfile: sut/Dockerfile
    image: hlsa2-lab-2-3/sut:dev
    container_name: hlsa2-sut
    environment:
      SUT_LISTEN_ADDR: ":8080"
      SUT_DB_DSN: "postgres://sut:sut@postgres:5432/sut?sslmode=disable"
      SUT_DOWNSTREAM_URL: "http://downstream:8081/api/widget"
      SUT_DB_POOL_SIZE: "${SUT_DB_POOL_SIZE:-10}"
      SUT_DOWNSTREAM_POOL_SIZE: "${SUT_DOWNSTREAM_POOL_SIZE:-256}"
      SUT_DOWNSTREAM_TIMEOUT_MS: "${SUT_DOWNSTREAM_TIMEOUT_MS:-30000}"
    depends_on:
      postgres:
        condition: service_healthy
      downstream:
        condition: service_healthy
    ports:
      - "${LAB_SUT_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:8080/healthz
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [labnet]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hlsa2-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "${LAB_PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [labnet]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hlsa2-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${LAB_GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [labnet]

networks:
  labnet:

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
