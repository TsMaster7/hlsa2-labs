global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    monitor: hlsa2-lab-2-3

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: sut
    metrics_path: /metrics
    static_configs:
      - targets: ["sut:8080"]
        labels:
          service: sut

  - job_name: downstream
    metrics_path: /metrics
    static_configs:
      - targets: ["downstream:8081"]
        labels:
          service: downstream

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host
