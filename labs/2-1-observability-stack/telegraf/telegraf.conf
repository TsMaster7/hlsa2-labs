# HLSA2 Lab 2-1 — Telegraf configuration
#
# Pipeline:  system inputs (USE) + service /metrics (RED)  ->  InfluxDB v2
#
# metric_version = 2 for the Prometheus input: all scraped metrics land in a
# single InfluxDB measurement named "prometheus", each Prometheus metric name
# becomes a FIELD, labels become tags, and histogram buckets are preserved
# (le tag) so Grafana can compute p50/p95/p99 with Flux's histogramQuantile().
# (System inputs like cpu/mem keep their own measurement names.)

[global_tags]
  environment = "lab"

[agent]
  interval = "10s"
  flush_interval = "10s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  # Stable host tag so Grafana queries don't key off a random container hash.
  hostname = "lab"
  omit_hostname = false

# ── OUTPUT: InfluxDB v2 ────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

# ── INPUT: System metrics (USE — Utilisation / Saturation) ────────────────
# Telegraf runs in a container sharing the host/VM kernel, so /proc/stat here
# reflects VM-wide CPU. usage_active is the "CPU utilisation" USE signal.
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]

[[inputs.net]]
  interfaces = ["eth0", "eth1"]

[[inputs.netstat]]

# ── INPUT: Application metrics scraped from the service Prometheus endpoint ─
# RED metrics (rate/errors/duration) and app-level USE (connection pool
# saturation) enter Telegraf here.
[[inputs.prometheus]]
  urls = ["http://service:9090/metrics"]
  interval = "10s"
  metric_version = 2
  # Tag the source so Grafana queries can filter by service.
  [inputs.prometheus.tags]
    source = "api-service"
