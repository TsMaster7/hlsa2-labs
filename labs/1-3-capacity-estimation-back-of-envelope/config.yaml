# Lab 1-3: Capacity Estimation (Back of Envelope)
#
# Tune these values, run `bash scripts/run-benchmark.sh`, and compare the
# observed metrics with the numbers you committed in capacity-estimate.md.
# Each section corresponds to one input axis of the back-of-envelope flow.

workload:
  dau: 1000000                  # daily active users
  sessions_per_user: 5          # sessions per DAU per day
  requests_per_session: 30      # API requests per session (read + write combined)
  payload_bytes: 4096           # average request/response payload size in bytes
  read_write_ratio: 9           # reads per write (9 = 90% reads, 10% writes)
  burst_factor: 4.0             # peak QPS / average QPS (e.g. 4 for a 4x daily peak)
  retention_months: 12          # how long write data is retained (months)

infra:
  replication_factor: 3         # storage replicas (>=1)
  cache_hit_ratio: 0.80         # assumed hit rate (0..1) for the read cache
  index_overhead: 0.30          # extra storage from secondary indexes (0.30 = +30%)
  fan_out_per_write: 2.0        # async change-events per write (search index, audit, ...)
  write_amplification: 1.4      # journal/compaction multiplier on writes hitting disk
  instance_qps_capacity: 5000   # sustainable QPS per node (read-equivalent)
  per_request_service_time_ms: 4.0   # baseline storage-path service time
  cache_hit_service_time_ms: 0.5     # service time on cache hit
  hot_data_fraction: 0.083      # 30-day hot tier out of 360-day retention (30/360); rest on cold object storage

capacity:
  target_buffer_pct: 40         # provision so peak load uses (100 - buffer)% of capacity
  cost_per_node_per_month_usd: 350
  cold_tier_cost_multiplier: 0.10    # cold-tier $/GB relative to hot-tier
  replication_lag_budget_s: 5.0      # acceptable lag at peak; informational

benchmark:
  sample_requests: 5000         # short measurement run for latency / observed hit rate
  sample_workers: 8             # concurrency of the sampling thread pool
  rng_seed: 42
