global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: lookup-svc
    static_configs:
      - targets: ["lookup-svc:8080"]

  - job_name: chain
    static_configs:
      - targets:
          - "auth:8091"
          - "pricing:8092"
          - "inventory:8093"

  - job_name: gateway
    static_configs:
      - targets: ["gateway:8090"]

  - job_name: producer
    static_configs:
      - targets: ["producer:8094"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:8095"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
