global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: hlsa2-lab-2-2

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: checkout
    metrics_path: /metrics
    static_configs:
      - targets: ["checkout:8080"]
        labels:
          service: checkout

  - job_name: payments
    metrics_path: /metrics
    static_configs:
      - targets: ["payments:8081"]
        labels:
          service: payments

  - job_name: loadgen
    metrics_path: /metrics
    static_configs:
      - targets: ["loadgen:9999"]
        labels:
          service: loadgen
