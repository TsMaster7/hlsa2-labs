# Benchmark configuration for Workload Characterization and Bottleneck Analysis
# Students: adjust these values or modify simulator/workload.py as your improvement.

service_time_ms: 10           # Base service time for read requests (ms)
write_service_time_ms: 15     # Base service time for write requests (ms) — WAL/fsync overhead
workers: 4                    # Connection pool size (thread pool)
total_requests: 1500          # Total requests per benchmark run
arrival_pattern: poisson      # poisson | bursty | regular
burst_cv: 2.0                 # Target coefficient of variation for bursty arrivals
read_fraction: 0.7            # Fraction of requests that are reads (0.0–1.0)
target_utilization: 0.85      # Arrival rate targets this utilisation on the bottleneck resource
io_workers: 2                 # I/O subsystem parallelism (simulated WAL writers)
replica_lag_ms: 5             # Simulated replica lag (used by CQRS improvement option)
